# Theme parameters
# See https://jpanther.github.io/congo/docs/configuration/#theme-parameters

# Default Open Graph / social preview image (1200×630px recommended)
# Place the file at static/images/default-og.jpg
images = ["/images/default-og.jpg"]

# Site description (used in meta description + OG description for homepage)
description = "Musings on software development, AI, and the tech industry from a veteran engineer."

colorScheme = "congo"
defaultAppearance = "auto"    # auto = follows OS preference
autoSwitchAppearance = true

enableSearch = true
enableCodeCopy = true

[header]
  layout = "basic"

[footer]
  showCopyright = true
  showThemeAttribution = true
  showAppearanceSwitcher = true
  showScrollToTop = true

[homepage]
  layout = "profile"
  showRecent = true
  recentLimit = 5

[article]
  showDate = true
  showDateUpdated = false
  showAuthor = false
  showBreadcrumbs = true
  showTableOfContents = true
  showTaxonomies = true
  showWordCount = false
  showComments = true
  showSummary = true

[list]
  showBreadcrumbs = false
  showSummary = true
  showTableOfContents = false
  groupByYear = true

[taxonomy]
  showTermCount = true
